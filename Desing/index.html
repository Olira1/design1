<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Step 1 font setup:
      These preconnect links help the browser connect to Google Fonts faster.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Step 1 font setup:
      Inter is for normal readable text.
      Playfair Display is for elegant fashion-style headings.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap"
      rel="stylesheet"
    />

    <!--
      Browser tab title:
      This is the name users see in the browser tab.
    -->
    <title>Atelier — Fashion Design & Sewing Training</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
